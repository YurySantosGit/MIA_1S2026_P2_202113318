<div class="app-container">
  <header class="header">
    <div>
      <h1>ExtreamFS</h1>
      <p>Frontend para ejecución de comandos y visualización de reportes</p>
    </div>
    <div class="status-badge">Backend: {{ backendStatus }}</div>
  </header>

  <main class="main-column">
    <section class="panel commands-panel">
      <h2>Entrada de comandos</h2>

      <textarea [(ngModel)]="commandInput"></textarea>

      <div class="button-group">
        <button (click)="executeCommands()">Ejecutar</button>
        <button class="secondary" (click)="clearCommandInput()">Limpiar</button>
      </div>
    </section>

    <section class="panel file-panel">
      <h2>Archivo .smia cargado</h2>

      <div class="file-section">
        <label for="fileInput" class="file-label">Seleccionar archivo</label>
        <input
          id="fileInput"
          type="file"
          accept=".smia,.txt"
          (change)="onFileSelected($event)"
        />
        <span class="file-name" *ngIf="selectedFileName">
          Archivo: {{ selectedFileName }}
        </span>
      </div>

      <textarea
        class="readonly-textarea"
        [value]="selectedFileContent"
        readonly
      ></textarea>

      <div class="button-group">
        <button (click)="executeLoadedFile()">Ejecutar archivo</button>
        <button class="secondary" (click)="clearLoadedFile()">Limpiar archivo</button>
      </div>
    </section>

    <section class="panel output-panel">
      <h2>Salida / Consola</h2>
      <pre>{{ outputText }}</pre>
    </section>
  </main>
</div>
